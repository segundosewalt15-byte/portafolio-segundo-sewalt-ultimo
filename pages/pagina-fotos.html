<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotos</title>
    <link rel="stylesheet" href="../styles/styles.css">
    
</head>

<body>

<header>
    <h1 class="titulo">Fotografías</h1>

    <nav>
        <ul>
            <li><a href="../index.html">Inicio</a></li>
        </ul>
    </nav>
</header>

    <main>

        <section class="seccion">
            <h2>Bienvenido a mi galería de fotos</h2>

            <article>
                <p>
                    En esta parte tengo todas las fotos que fui sacando
                    mientras repartía o viajaba.
                    Me pareció una buena idea compartirlas en esta
                    sección.
                </p>
            </article>
        </section>

        <section class="seccion">
            <h2>Fotos</h2>

            <article>

                <figure>
                    <img
                        class="fotos"
                        src="../assets/clinica.png"
                        alt="frente de la clínica modelo de Tandil">


                    <figcaption>
                        Esto fue mientras repartía. Al ver un hombre esperando el colectivo,
                        me pareció una buena oportunidad para sacar una foto.
                    </figcaption>
                </figure>

                <figure>
                    <img
                        class="fotos"
                        src="../assets/camioneta.png"
                        alt="camioneta quemada en la salida de Tandil junto a un cartel de indicaciones afectado por el fuego">

                    <figcaption>
                        Salida de Tandil "Lugar Soñado".
                    </figcaption>
                </figure>
            </article>
            
            <article>
            
                <figure>
                    <img
                        class="fotos"
                        src="../assets/catedral.jpeg"
                        alt="foto de catedral en blanco y negro">

                    <figcaption>
                        Muy buena catedral, la tome con un iphone SE.
                    </figcaption>
                </figure>

            </article>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 - Segundo Sewalt. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
